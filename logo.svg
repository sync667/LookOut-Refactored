<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient: deep Thunderbird-family blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0A1F6B"/>
    </linearGradient>
    <!-- Iris gradient: bright to mid blue -->
    <linearGradient id="irisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <!-- Subtle inner glow for the eye -->
    <radialGradient id="eyeGlow" cx="55%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow filter for envelope -->
    <filter id="envShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ── Background rounded square ── -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>

  <!-- ── Envelope body (solid white) ── -->
  <rect x="7" y="14" width="50" height="38" rx="3.5" fill="white" filter="url(#envShadow)"/>

  <!-- ── Envelope top-flap triangle (light blue) ── -->
  <polygon points="7,14 32,31 57,14" fill="#DBEAFE"/>

  <!-- ── Bottom corner fold lines ── -->
  <line x1="7"  y1="52" x2="24" y2="37" stroke="#BFDBFE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="57" y1="52" x2="40" y2="37" stroke="#BFDBFE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Envelope outline strokes ── -->
  <rect x="7" y="14" width="50" height="38" rx="3.5" fill="none" stroke="#93C5FD" stroke-width="1.5"/>
  <polyline points="7,14 32,31 57,14" fill="none" stroke="#93C5FD" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ══ EYE — centered in the envelope body below the flap ══ -->
  <!-- Almond / sclera (white of the eye) -->
  <path d="M 19,43 C 21,34 43,34 45,43 C 43,52 21,52 19,43 Z" fill="white"/>

  <!-- Optional subtle glow inside eye almond -->
  <path d="M 19,43 C 21,34 43,34 45,43 C 43,52 21,52 19,43 Z" fill="url(#eyeGlow)"/>

  <!-- Iris -->
  <circle cx="32" cy="43" r="6.5" fill="url(#irisGrad)"/>

  <!-- Pupil -->
  <circle cx="32" cy="43" r="3" fill="#06102E"/>

  <!-- Specular highlight (top-right of pupil) -->
  <circle cx="34.2" cy="41.2" r="2" fill="white" fill-opacity="0.88"/>

  <!-- Tiny second catchlight -->
  <circle cx="30.5" cy="44.8" r="0.8" fill="white" fill-opacity="0.4"/>

  <!-- Eye outline (thin, same tone as envelope stroke) -->
  <path d="M 19,43 C 21,34 43,34 45,43 C 43,52 21,52 19,43 Z"
        fill="none" stroke="#93C5FD" stroke-width="0.8"/>
</svg>

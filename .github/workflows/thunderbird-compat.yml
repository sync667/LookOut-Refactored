name: Thunderbird Compatibility Check

on:
  schedule:
    # Run weekly on Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  check-thunderbird-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest Thunderbird release version
        id: tb
        run: |
          # Fetch latest Thunderbird release info from Mozilla
          TB_VERSION=$(curl -sf "https://product-details.mozilla.org/1.0/thunderbird_versions.json" \
            | node -e "
              let d='';
              process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                const v=JSON.parse(d);
                // Use LATEST_THUNDERBIRD_VERSION for stable release
                const ver = v.LATEST_THUNDERBIRD_VERSION || '';
                // Extract major version number
                const major = ver.split('.')[0];
                console.log(major);
              });
            ")
          echo "MAJOR=$TB_VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest Thunderbird major version: $TB_VERSION"

      - name: Read current strict_max_version
        id: current
        run: |
          CURRENT=$(node -e "
            const m = JSON.parse(require('fs').readFileSync('src/manifest.json','utf8'));
            const max = m.browser_specific_settings?.gecko?.strict_max_version || '';
            // Extract the numeric part (e.g. '150.*' -> '150')
            console.log(max.replace('.*',''));
          ")
          echo "MAX=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current strict_max_version: $CURRENT.*"

      - name: Update strict_max_version if needed
        id: update
        run: |
          TB_MAJOR="${{ steps.tb.outputs.MAJOR }}"
          CURRENT_MAX="${{ steps.current.outputs.MAX }}"

          if [ -z "$TB_MAJOR" ] || [ "$TB_MAJOR" = "0" ]; then
            echo "Could not determine Thunderbird version, skipping"
            echo "UPDATED=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Set max to latest major + 2 to give breathing room
          NEW_MAX=$(( TB_MAJOR + 2 ))

          if [ "$NEW_MAX" -le "$CURRENT_MAX" ]; then
            echo "Current max ($CURRENT_MAX.*) already covers TB $TB_MAJOR, no update needed"
            echo "UPDATED=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Updating strict_max_version from $CURRENT_MAX.* to $NEW_MAX.*"

          node -e "
            const fs = require('fs');
            const path = 'src/manifest.json';
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            m.browser_specific_settings.gecko.strict_max_version = '${NEW_MAX}.*';
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
          "

          echo "UPDATED=true" >> "$GITHUB_OUTPUT"
          echo "NEW_MAX=$NEW_MAX" >> "$GITHUB_OUTPUT"
          echo "TB_MAJOR=$TB_MAJOR" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.update.outputs.UPDATED == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/bump-thunderbird-compat
          delete-branch: true
          commit-message: "chore: bump strict_max_version to ${{ steps.update.outputs.NEW_MAX }}.* for Thunderbird ${{ steps.update.outputs.TB_MAJOR }}"
          title: "chore: bump Thunderbird compatibility to ${{ steps.update.outputs.NEW_MAX }}.*"
          body: |
            ## Summary

            Thunderbird **${{ steps.update.outputs.TB_MAJOR }}** has been released.
            This PR updates `strict_max_version` from `${{ steps.current.outputs.MAX }}.*` to `${{ steps.update.outputs.NEW_MAX }}.*`.

            **Action needed:** Verify the extension works on Thunderbird ${{ steps.update.outputs.TB_MAJOR }} before merging.

            ---
            *Automatically generated by the Thunderbird Compatibility Check workflow.*
          labels: compatibility
